<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>פאזל רקסי</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 8px 24px; overflow-x: hidden;
    }
    .header { text-align:center; margin-bottom:10px; color:#fff; }
    .header h1 {
      font-size:28px; font-weight:900;
      background: linear-gradient(90deg,#fff 0%,#ffd700 50%,#fff 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .header p { font-size:13px; color:rgba(255,255,255,.75); margin-top:3px; }
    .stats {
      display:flex; gap:12px;
      background:rgba(255,255,255,.1); backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.15); border-radius:20px;
      padding:8px 20px; margin-bottom:12px;
      color:#fff; font-weight:700; font-size:13px;
    }
    .stats span { display:flex; align-items:center; gap:4px; }
    .game-area {
      display:flex; gap:10px; align-items:flex-start;
      justify-content:center; width:100%; max-width:440px;
    }
    #grid {
      display:grid; background:#000;
      border:2px solid rgba(255,215,0,.4); border-radius:8px;
      overflow:hidden; touch-action:manipulation; user-select:none; flex-shrink:0;
      box-shadow:0 0 30px rgba(255,215,0,.15);
    }
    .piece { cursor:pointer; overflow:hidden; transition:transform .12s; }
    .piece canvas { display:block; width:100%; height:100%; }
    .piece.selected {
      outline:3px solid #FFD700; outline-offset:-2px;
      z-index:5; transform:scale(1.06); filter:brightness(1.15);
    }
    .piece.ok { outline:2px solid rgba(0,230,80,.6); outline-offset:-1px; }
    .side { display:flex; flex-direction:column; align-items:center; gap:8px; min-width:76px; }
    .preview-wrap {
      background:rgba(255,255,255,.1); border:1px solid rgba(255,215,0,.3);
      border-radius:10px; padding:4px;
    }
    .preview-label { font-size:9px; color:rgba(255,255,255,.65); text-align:center; margin-bottom:2px; }
    #preview { display:block; width:72px; height:72px; border-radius:6px; }
    .btn {
      width:76px; padding:9px 0; border:none; border-radius:18px;
      font-size:11px; font-weight:700; cursor:pointer;
      transition:transform .1s, opacity .1s; text-align:center;
    }
    .btn:active { transform:scale(.93); }
    .btn-shuffle { background:linear-gradient(135deg,#ff6b35,#ff9a56); color:#fff; }
    .btn-hint    { background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.25); }
    .btn-photo   { background:linear-gradient(135deg,#4f8ef7,#7b5ea7); color:#fff; }
    .prog-wrap {
      width:100%; max-width:340px;
      background:rgba(255,255,255,.15); border-radius:10px; height:8px;
      margin-top:10px; overflow:hidden;
    }
    #prog { height:100%; background:linear-gradient(90deg,#00e664,#ffd700); border-radius:10px; width:0%; transition:width .3s; }
    #win {
      position:fixed; inset:0; background:rgba(0,0,0,.82);
      display:flex; align-items:center; justify-content:center;
      z-index:100; opacity:0; pointer-events:none; transition:opacity .4s;
    }
    #win.show { opacity:1; pointer-events:all; }
    .win-box {
      background:linear-gradient(160deg,#1a1a2e,#16213e);
      border:2px solid rgba(255,215,0,.5); border-radius:24px;
      padding:28px 22px; text-align:center; max-width:270px; width:88%;
      animation:popIn .5s ease-out; color:#fff;
    }
    @keyframes popIn { 0%{transform:scale(.4);opacity:0} 70%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
    .win-box .emo { font-size:58px; }
    .win-box h2 { font-size:26px; font-weight:900; color:#ffd700; margin:8px 0 6px; }
    #win-img { width:120px; height:120px; border-radius:12px; margin:8px auto; display:block; border:2px solid rgba(255,215,0,.4); }
    #win-info { color:rgba(255,255,255,.75); font-size:13px; margin-bottom:18px; }
    .win-btn { background:linear-gradient(135deg,#ff6b35,#ff9a56); color:#fff; border:none; border-radius:22px; padding:12px 30px; font-size:15px; font-weight:700; cursor:pointer; }
    @keyframes floatUp { from{transform:translateY(0) scale(1);opacity:1} to{transform:translateY(-230px) scale(.35);opacity:0} }
  </style>
</head>
<body>

<div class="header">
  <h1>🐕 פאזל רקסי</h1>
  <p>כלב של אהבה ♥ &nbsp;|&nbsp; 36 חלקים</p>
</div>

<div class="stats">
  <span>⏱️ <span id="tmr">00:00</span></span>
  <span>🔄 <span id="mv">0</span> מהלכים</span>
  <span>✅ <span id="ok">0</span>/36</span>
</div>

<div class="game-area">
  <div id="grid"></div>
  <div class="side">
    <div class="preview-wrap">
      <div class="preview-label">תמונה מלאה</div>
      <canvas id="preview" width="72" height="72"></canvas>
    </div>
    <button class="btn btn-shuffle" onclick="reset()">🔀 ערבב</button>
    <button class="btn btn-hint"    onclick="hint()">💡 רמז</button>
    <label class="btn btn-photo" style="display:flex;align-items:center;justify-content:center;cursor:pointer;">
      📷 תמונה שלי
      <input type="file" accept="image/*" style="display:none" onchange="loadPhoto(this)">
    </label>
  </div>
</div>

<div class="prog-wrap"><div id="prog"></div></div>

<div id="win">
  <div class="win-box">
    <div class="emo">🎉</div>
    <h2>כל הכבוד!</h2>
    <canvas id="win-img" width="120" height="120"></canvas>
    <p id="win-info"></p>
    <button class="win-btn" onclick="reset();document.getElementById('win').classList.remove('show')">🔄 שחק שוב</button>
  </div>
</div>

function boot(img){
  src=document.createElement('canvas');
  src.width=SZ; src.height=SZ;
  var c=src.getContext('2d');
  var s=Math.min(img.naturalWidth,img.naturalHeight);
  var sx=(img.naturalWidth-s)/2, sy=(img.naturalHeight-s)/2;
  c.drawImage(img,sx,sy,s,s,0,0,SZ,SZ);
  c.strokeStyle='rgba(0,0,0,.07)'; c.lineWidth=0.5;
  for(var i=1;i<GRID;i++){
    var p=i*SPX;
    c.beginPath();c.moveTo(p,0);c.lineTo(p,SZ);c.stroke();
    c.beginPath();c.moveTo(0,p);c.lineTo(SZ,p);c.stroke();
  }
  document.getElementById('preview').getContext('2d').drawImage(src,0,0,72,72);
  document.getElementById('win-img').getContext('2d').drawImage(src,0,0,120,120);
}

function initImg(cb){
  var img=new Image();
  img.onload=function(){boot(img);cb();};
  img.src='data:image/jpeg;base64,'+B64;
}

function loadPhoto(inp){
  if(!inp.files||!inp.files[0])return;
  var r=new FileReader();
  r.onload=function(e){
    var img=new Image();
    img.onload=function(){
      boot(img);
      ord=Array.from({length:36},function(_,i){return i;});
      shuffle(); mv=0; sec=0; going=false;
      if(tick){clearInterval(tick);tick=null;}
      document.getElementById('tmr').textContent='00:00';
      draw();
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(inp.files[0]);
}

function draw(){
  var g=document.getElementById('grid');
  g.innerHTML='';
  var avail=Math.min(window.innerWidth-100,336);
  var ps=Math.floor(avail/GRID);
  g.style.gridTemplateColumns='repeat('+GRID+','+ps+'px)';
  ord.forEach(function(pid,pos){
    var cell=document.createElement('div');
    cell.className='piece'+(pos===sel?' selected':'')+(pid===pos?' ok':'');
    cell.style.cssText='width:'+ps+'px;height:'+ps+'px;';
    var pc=document.createElement('canvas');
    pc.width=ps;pc.height=ps;
    var sr=Math.floor(pid/GRID),sc=pid%GRID;
    pc.getContext('2d').drawImage(src,sc*SPX,sr*SPX,SPX,SPX,0,0,ps,ps);
    cell.appendChild(pc);
    cell.addEventListener('click',function(){tap(pos);});
    g.appendChild(cell);
  });
  stats();
}

function tap(pos){
  if(!going){going=true;startTick();}
  if(sel===null){sel=pos;}
  else if(sel===pos){sel=null;}
  else{
    var t=ord[sel];ord[sel]=ord[pos];ord[pos]=t;
    mv++;sel=null;draw();win();return;
  }
  draw();
}

function shuffle(){
  for(var i=ord.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=ord[i];ord[i]=ord[j];ord[j]=t;
  }
  if(solved())shuffle();
}

function reset(){
  sel=null;mv=0;sec=0;going=false;
  if(tick){clearInterval(tick);tick=null;}
  document.getElementById('tmr').textContent='00:00';
  ord=Array.from({length:36},function(_,i){return i;});
  shuffle();draw();
}

function hint(){
  var cells=document.querySelectorAll('.piece');
  cells.forEach(function(c,i){if(ord[i]===i)c.style.boxShadow='0 0 0 3px #00e664 inset';});
  setTimeout(function(){cells.forEach(function(c){c.style.boxShadow='';});},1800);
}

function startTick(){
  tick=setInterval(function(){
    sec++;
    var m=String(Math.floor(sec/60)).padStart(2,'0');
    var s=String(sec%60).padStart(2,'0');
    document.getElementById('tmr').textContent=m+':'+s;
  },1000);
}

function solved(){return ord.every(function(id,pos){return id===pos;});}
function okCount(){return ord.filter(function(id,pos){return id===pos;}).length;}

function stats(){
  var ok=okCount();
  document.getElementById('mv').textContent=mv;
  document.getElementById('ok').textContent=ok;
  document.getElementById('prog').style.width=((ok/36)*100)+'%';
}

function win(){
  if(!solved())return;
  if(tick){clearInterval(tick);tick=null;}
  var m=String(Math.floor(sec/60)).padStart(2,'0');
  var s=String(sec%60).padStart(2,'0');
  document.getElementById('win-info').textContent=
    'זמן: '+m+':'+s+'   |   מהלכים: '+mv;
  setTimeout(function(){
    document.getElementById('win').classList.add('show');
    hearts();
  },350);
}

function hearts(){
  var pool=['❤️','🐕','🎉','⭐','💛','🌸','🏆'];
  for(var i=0;i<22;i++){
    (function(delay){
      setTimeout(function(){
        var el=document.createElement('div');
        el.style.cssText='position:fixed;left:'+(Math.random()*100)+'vw;top:'+(55+Math.random()*35)+'vh;font-size:'+(18+Math.random()*28)+'px;pointer-events:none;z-index:200;animation:floatUp '+(1.4+Math.random())+'s ease-out forwards;';
        el.textContent=pool[Math.floor(Math.random()*pool.length)];
        document.body.appendChild(el);
        setTimeout(function(){el.remove();},2600);
      },delay);
    })(i*85);
  }
}

window.addEventListener('load',function(){
  initImg(function(){
    ord=Array.from({length:36},function(_,i){return i;});
    shuffle();draw();
  });
});
window.addEventListener('resize',function(){if(src)draw();});
</script>
</body>
</html>

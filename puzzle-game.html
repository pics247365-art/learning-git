<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    gap: 20px;
  }

  h1 { font-size: 1.6rem; letter-spacing: 1px; color: #e0c97f; }

  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button, label.btn {
    padding: 9px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  button:hover, label.btn:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: default; }

  #uploadLabel { background: #e0c97f; color: #1a1a2e; }
  #shuffleBtn  { background: #4a90d9; color: #fff; }
  #solveBtn    { background: #3cb371; color: #fff; }

  #fileInput { display: none; }

  .arena {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
  }

  .board-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .board-label { font-size: 0.8rem; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
    background: #0d0d1a;
    padding: 3px;
    border-radius: 6px;
  }

  .piece {
    width: 90px;
    height: 90px;
    background-size: 360px 360px;
    background-repeat: no-repeat;
    border-radius: 3px;
    cursor: grab;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .piece:active { cursor: grabbing; }

  .piece.dragging {
    opacity: 0.35;
  }

  .piece.drag-over {
    box-shadow: inset 0 0 0 3px #e0c97f;
    transform: scale(1.06);
  }

  .tray {
    background: #0d0d1a;
    padding: 3px;
    border-radius: 6px;
    min-height: 96px;
    min-width: 96px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
  }

  #status {
    font-size: 1rem;
    min-height: 1.4em;
    color: #e0c97f;
    letter-spacing: 0.5px;
  }

  .placeholder {
    width: 360px;
    height: 360px;
    background: #16213e;
    border: 2px dashed #444;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 0.9rem;
    text-align: center;
    padding: 20px;
  }

  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .solved-anim { animation: pop 0.4s ease; }
</style>
</head>
<body>

<h1>Puzzle Game</h1>

<div class="controls">
  <label class="btn" id="uploadLabel" for="fileInput">Upload Image</label>
  <input type="file" id="fileInput" accept="image/*">
  <button id="shuffleBtn" disabled>Shuffle</button>
  <button id="solveBtn"   disabled>Solve</button>
</div>

<div id="status"></div>

<div class="arena">
  <div class="board-wrap">
    <div class="board-label">Puzzle</div>
    <div class="board" id="board">
      <div class="placeholder">Upload an image to start</div>
    </div>
  </div>
</div>

<script>
(() => {
  const COLS = 4, ROWS = 4, N = COLS * ROWS;
  const PIECE_SIZE = 90;
  const BOARD_SIZE = PIECE_SIZE * COLS; // 360

  const fileInput  = document.getElementById('fileInput');
  const board      = document.getElementById('board');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const solveBtn   = document.getElementById('solveBtn');
  const statusEl   = document.getElementById('status');

  let imageUrl   = null;
  // pieces[i] = the original tile index currently in board slot i
  let pieces     = [];
  let dragSrcIdx = null;

  // ── Image upload ──────────────────────────────────────────────
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      imageUrl = ev.target.result;
      pieces = Array.from({ length: N }, (_, i) => i); // solved order
      render();
      shuffleBtn.disabled = false;
      solveBtn.disabled   = false;
      setStatus('Image loaded — hit Shuffle to play!');
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  // ── Shuffle ───────────────────────────────────────────────────
  shuffleBtn.addEventListener('click', () => {
    do { shuffle(pieces); } while (isSolved());
    render();
    setStatus('Drag pieces to solve the puzzle.');
  });

  // ── Solve ─────────────────────────────────────────────────────
  solveBtn.addEventListener('click', () => {
    pieces = Array.from({ length: N }, (_, i) => i);
    render();
    setStatus('Solved!');
  });

  // ── Shuffle helper (Fisher-Yates) ─────────────────────────────
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  // ── Check solved ──────────────────────────────────────────────
  function isSolved() {
    return pieces.every((v, i) => v === i);
  }

  // ── Render board ──────────────────────────────────────────────
  function render() {
    board.innerHTML = '';
    pieces.forEach((tileIdx, slotIdx) => {
      const el = document.createElement('div');
      el.className = 'piece';
      el.dataset.slot = slotIdx;

      const col = tileIdx % COLS;
      const row = Math.floor(tileIdx / COLS);
      el.style.backgroundImage = `url(${imageUrl})`;
      el.style.backgroundPosition =
        `-${col * PIECE_SIZE}px -${row * PIECE_SIZE}px`;
      el.style.backgroundSize = `${BOARD_SIZE}px ${BOARD_SIZE}px`;

      el.setAttribute('draggable', true);
      attachDragEvents(el, slotIdx);
      board.appendChild(el);
    });
  }

  // ── Drag & drop ───────────────────────────────────────────────
  function attachDragEvents(el, slotIdx) {
    el.addEventListener('dragstart', e => {
      dragSrcIdx = slotIdx;
      // slight delay so the element is visible during drag
      requestAnimationFrame(() => el.classList.add('dragging'));
      e.dataTransfer.effectAllowed = 'move';
    });

    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      clearDragOver();
    });

    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (slotIdx !== dragSrcIdx) el.classList.add('drag-over');
    });

    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));

    el.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === slotIdx) return;
      [pieces[dragSrcIdx], pieces[slotIdx]] =
        [pieces[slotIdx], pieces[dragSrcIdx]];
      dragSrcIdx = null;
      render();
      if (isSolved()) {
        setStatus('Puzzle solved! 🎉');
        board.querySelectorAll('.piece').forEach(p => p.classList.add('solved-anim'));
      }
    });
  }

  function clearDragOver() {
    board.querySelectorAll('.drag-over')
      .forEach(el => el.classList.remove('drag-over'));
  }

  function setStatus(msg) { statusEl.textContent = msg; }
})();
</script>
</body>
</html>
